# ==============================================================================
# Gradle Wrapper Properties
#
# The Gradle Wrapper allows running Gradle without installing it.
# This file specifies which Gradle version to download and use.
#
# Benefits:
#   - No Gradle installation required on developer machines
#   - Everyone uses the exact same Gradle version
#   - CI/CD and local builds are identical
#   - Easy version updates (just change distributionUrl)
#
# Usage:
#   ./gradlew build     (Unix/macOS)
#   gradlew.bat build   (Windows)
#
# To update Gradle version:
#   Option 1: gradle wrapper --gradle-version 8.6
#   Option 2: Manually change distributionUrl below
#
# IMPORTANT: Keep this version in sync with Dockerfile (gradle:X.X-jdk17)
#
# Documentation: docs/GRADLE.md
# ==============================================================================

# Where to store the downloaded Gradle distribution
# GRADLE_USER_HOME defaults to ~/.gradle/
distributionBase=GRADLE_USER_HOME

# Subdirectory under distributionBase for Gradle distributions
distributionPath=wrapper/dists

# URL to download Gradle from
# Format: https://services.gradle.org/distributions/gradle-{VERSION}-{TYPE}.zip
# Types:
#   bin  - Binary distribution (smaller, just what you need to run Gradle)
#   all  - Includes source code and documentation
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip

# Timeout for downloading Gradle (in milliseconds)
# Increase this on slow networks
networkTimeout=10000

# Validate the distribution URL before downloading
# Set to false if using custom/internal distribution URLs
validateDistributionUrl=true

# Where to store the downloaded zip file
zipStoreBase=GRADLE_USER_HOME

# Subdirectory under zipStoreBase for zip files
zipStorePath=wrapper/dists
